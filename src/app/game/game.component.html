<header class="d-flex align-items-center justify-content-between">
  <h1>
    Tic Tac Toe
  </h1>
  <a href="https://github.com/joster-dev/tic-tac-toe">
    Github
  </a>
</header>
<section id="game">
  @for (cell of game().grid; track cell.x + ',' + cell.y + ',' + cell.state) {
    <ttt-cell
      [cell]="cell"
      [disabled]="allowClicks() === false"
      [gameTurn]="game().turn"
      [highlight]="game().winPath.includes(cell)"
      [style.grid-column]="cell.x + 1"
      [style.grid-row]="cell.y + 1"
      (claim)="claim(cell)"
    ></ttt-cell>
  }
</section>
<ttt-form
  [disabled]="!allowClicks()"
  (restart)="newGame(true)"
></ttt-form>
<footer class="w-lg d-flex justify-content-end">
  <a href="https://joster-dev.github.io/">
    © Jacob Osterhout 2024
  </a>
</footer>
