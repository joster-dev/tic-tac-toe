<header class="d-flex align-items-center justify-content-between">
  <h1>
    Tic Tac Toe
  </h1>
  <a href="https://github.com/joster-dev/tic-tac-toe">
    Github
  </a>
</header>
<section id="game">
  @for (cell of store.cells(); track cell.index) {
  <ttt-cell
    [mark]="cell.mark"
    [index]="cell.index"
    [turn]="store.turn()"
    [highlight]="store.winningLine().includes(cell.index)"
    [disabled]="store.busy() || store.outcome().kind !== 'playing'"
    [style.grid-column]="cell.column"
    [style.grid-row]="cell.row"
    (claim)="store.play($event)"
  ></ttt-cell>
  }
</section>
<ttt-form
  [disabled]="store.busy()"
  (restart)="store.newGame()"
></ttt-form>
<footer class="w-lg d-flex justify-content-end">
  <a href="https://joster-dev.github.io/">
    © Jacob Osterhout 2026
  </a>
</footer>
