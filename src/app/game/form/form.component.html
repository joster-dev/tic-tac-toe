<form
  novalidate
  #form="ngForm"
  class="d-flex gap-2 flex-column"
>
  <div class="d-flex justify-content-center">
    <button
      [disabled]="disabled()"
      type="button"
      class="d-flex gap-1 align-items-center"
      (click)="restart.emit()"
    >
      New Game
    </button>
  </div>
  <div class="card">
    <div class="card-header">
      <h2 class="d-flex gap-2 align-items-center justify-content-between">
        <span>
          Settings
        </span>
        <icon
          type="gear"
          size="1em"
          [fillOpacity]="0"
        ></icon>
      </h2>
    </div>
    <div class="card-body settings">
      <cc-text
        [ngModel]="settings.player1()"
        (ngModelChange)="settings.player1.set($event)"
        name="player1"
        [disabled]="settings.botPlayer() === 'x'"
        [maxLength]="15"
      >
        X Name
      </cc-text>
      <cc-text
        [ngModel]="settings.player2()"
        (ngModelChange)="settings.player2.set($event)"
        name="player2"
        [disabled]="settings.botPlayer() === 'o'"
        [maxLength]="15"
      >
        O Name
      </cc-text>
      <cc-color
        [ngModel]="settings.xColor()"
        (ngModelChange)="settings.xColor.set($event)"
        name="xColor"
      >
        X Theme
      </cc-color>
      <cc-color
        [ngModel]="settings.oColor()"
        (ngModelChange)="settings.oColor.set($event)"
        name="oColor"
      >
        O Theme
      </cc-color>
      <cc-choice
        [ngModel]="settings.goesFirst()"
        (ngModelChange)="settings.goesFirst.set($event); restart.emit()"
        name="goesFirst"
        required
        [disabled]="disabled()"
        [items]="players"
      >
        Who goes first
      </cc-choice>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <h2 class="d-flex gap-2 align-items-center justify-content-between">
        <span>Bot Settings</span>
        <icon
          type="user"
          size="1em"
          [fillOpacity]="0"
        ></icon>
      </h2>
    </div>
    <div class="card-body bot-settings">
      <cc-choice
        [ngModel]="settings.botPlayer()"
        (ngModelChange)="settings.botPlayer.set($event); restart.emit()"
        name="botPlayer"
        [disabled]="disabled()"
        [items]="players"
      >
        Play
      </cc-choice>
      <cc-choice
        [ngModel]="settings.opening()"
        (ngModelChange)="settings.opening.set($event); restart.emit()"
        name="opening"
        required
        [disabled]="!settings.botPlayer() || settings.botPlayer() !== settings.goesFirst() || disabled()"
        [items]="openings"
      >
        First move
      </cc-choice>
    </div>
  </div>
</form>
